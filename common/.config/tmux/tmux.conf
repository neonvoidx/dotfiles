# ============================================
# ESSENTIAL SETTINGS
# ============================================
# 1 based indexing
set -g base-index 1
set -g pane-base-index 1

# Fix Vim ESC delay
set -sg escape-time 0

# Scrollback
set -g history-limit 50000

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set term colors
set -g default-terminal "tmux-256color"
set -as terminal-feature ",xterm-256color:RGB"

# Aggressive resize for multi client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Prefix
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Better pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim style nav
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# Vim style resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# APPEARANCE
# ============================================

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style 'bg=#323449 fg=#ebfafa'
set -g status-left-length 20
set -g status-right-length 50

# Status bar content
set -g status-left '#[fg=#00e68a,bold] #{session_name} #[fg=#30363d]│ '
set -g status-right '#[fg=#04d1f9] %H:%M %d-%b-%y '

# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#00e68a,bold] #I:#W '

# Pane border colors
set -g pane-border-style 'fg=#30363d'
set -g pane-active-border-style 'fg=#00e68a'

# Message styling
set -g message-style 'bg=#00e68a fg=#000000 bold'

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # macOS
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"  # Linux

# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
